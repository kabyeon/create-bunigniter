name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run src/index.ts -- --version

  test-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: |
          PROJ=$(mktemp -d)/test-app
          bun run src/index.ts "$PROJ" <<< "n"
          cd "$PROJ"
          bun install
          bun run seed
          echo "✅ scaffold + seed OK"
